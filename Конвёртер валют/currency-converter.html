<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Конвёртер валют</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="header__title">Конвертер валют</h1>

        </div>
    </header>
    <main class="main">
        <section class="converter">
            <div class="container">
                <h2 class="visually-hidden">Калькулятор валют</h2>
                <div class="converter__wrap">
                    <div class="converter__wrap-left converter__wrap-left--active"><!--converter__wrap-left--active-->
                        <span class="converter__text">У меня имеется</span>
                        <div class="custom-select">
                            <button type="button" class="custom-select__btn">
                                <span class="custom-select__label" data-type="available">Российский рубль rur</span>
                                <svg class="custom-select__btn-icon" width="12" height="6" aria-hidden="true">
                                    <use xlink:href="images/sprite.svg#down-arrow"></use>
                                </svg>
                            </button>
                            <ul class="custom-select__list">
                                <li class="custom-select__item">
                                    <button class="custom-select__sublink" type="button">Российский рубль <span
                                            class="custom-select__sublink-bold">rur</span>
                                    </button>
                                </li>
                                <li class="custom-select__item">
                                    <button class="custom-select__sublink" type="button">Российский рубль <span
                                            class="custom-select__sublink-bold">rur</span>
                                    </button>
                                </li>
                            </ul>
                        </div>
                        <input class="custom-input" type="number">
                    </div>
                    <button class="converter__btn-revers" type="button">
                        <svg class="converter__btn-icon converter__btn-icon--straight" width="48" height="51"
                            aria-hidden="true">
                            <use xlink:href="images/sprite.svg#straight-arrows"></use>
                        </svg>
                        <svg class="converter__btn-icon converter__btn-icon--round" width="56" height="56"
                            aria-hidden="true">
                            <use xlink:href="images/sprite.svg#round-arrows"></use>
                        </svg>
                    </button>
                    <div class="converter__wrap-right">
                        <span class="converter__text">Хочу приобрести</span>
                        <div class="custom-select">
                            <button type="button" class="custom-select__btn">
                                <span class="custom-select__label" data-type="available">Российский рубль rur</span>
                                <svg class="custom-select__btn-icon" width="12" height="6" aria-hidden="true">
                                    <use xlink:href="images/sprite.svg#down-arrow"></use>
                                </svg>
                            </button>
                            <ul class="custom-select__list">
                                <li class="custom-select__item">
                                    <button class="custom-select__sublink" type="button">Российский рубль <span
                                            class="custom-select__sublink-bold">rur</span>
                                    </button>
                                </li>
                                <li class="custom-select__item">
                                    <button class="custom-select__sublink" type="button">Российский рубль <span
                                            class="custom-select__sublink-bold">rur</span>
                                    </button>
                                </li>
                            </ul>
                        </div>
                        <input class="custom-input" type="number">
                    </div>
                </div>
            </div>
        </section>
        <section class="courses">
            <div class="container">
                <div class="custom-table">
                    <ul class="custom-table__thead">
                        <li class="custom-table__head custom-table__head--code">Код</li>
                        <li class="custom-table__head custom-table__head--unit">Единица</li>
                        <li class="custom-table__head custom-table__head--currency">Валюта</li>
                        <li class="custom-table__head custom-table__head--basic-course">Курс базовой валюты</li>
                    </ul>
                    <div class="custom-table__tbody">
                        <ul class="custom-table__trow">
                            <li class="custom-table__text custom-table__text--code">USD</li>
                            <li class="custom-table__text custom-table__text--unit">1</li>
                            <li class="custom-table__text custom-table__text--currency">Доллар США</li>
                            <li class="custom-table__text custom-table__text--basic-course">76.8373</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
